name: Build and push to Docker Hub

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 pour le scan Trivy sur le runner ; arm64 pour le déploiement Pi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-alexismetton:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-alexismetton:sha-${{ steps.sha.outputs.short_sha }}

  trivy-image-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-alexismetton:sha-${{ needs.build-and-push.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  update-gitops:
    needs: [build-and-push, trivy-image-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Update GitOps repo with new image tag
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -e
          git clone --depth 1 https://x-access-token:${GITOPS_TOKEN}@github.com/AlexisMetton/kubesecurebox_gitops.git gitops
          cd gitops
          sed -i.bak "s|image: ${DOCKERHUB_USERNAME}/portfolio-alexismetton:.*|image: ${DOCKERHUB_USERNAME}/portfolio-alexismetton:sha-${SHORT_SHA}|" apps/portfolio/deployment.yaml
          rm -f apps/portfolio/deployment.yaml.bak
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio/deployment.yaml
          if git diff --staged --quiet; then
            echo "No change in deployment image tag."
          else
            git commit -m "chore(portfolio): update image to sha-${SHORT_SHA}"
            git push origin main
          fi
